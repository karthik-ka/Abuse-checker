<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ══════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════ */
const ts = () => new Date().toISOString().replace('T',' ').slice(0,19);

const normalizeDefanged = t =>
  t.replace(/hxxps:\/\//gi,'https://')
   .replace(/hxxp:\/\//gi,'http://')
   .replace(/\[\.\]|\(\.\)/g,'.')
   .replace(/\[:\]/g,':');

const defang = url =>
  url.replace(/https:\/\//gi,'hxxps://')
     .replace(/http:\/\//gi,'hxxp://')
     .replace(/\./g,'[.]');

const extractUrls = t => {
  const n = normalizeDefanged(t);
  return [...new Set(n.match(/https?:\/\/[^\s"'<>]+/gi)||[])];
};

const extractIPs = t =>
  [...new Set((t.match(/\b(?:\d{1,3}\.){3}\d{1,3}\b/g)||[]))];

const copyToClipboard = async text => {
  try { await navigator.clipboard.writeText(text); return true; }
  catch { return false; }
};

const calcSubnet = cidr => {
  const [ipStr, bits] = cidr.split('/');
  const prefix = parseInt(bits);
  if (isNaN(prefix)||prefix<0||prefix>32) return null;
  const ipParts = ipStr.split('.').map(Number);
  if (ipParts.length!==4||ipParts.some(x=>isNaN(x)||x<0||x>255)) return null;
  const ipNum = ipParts.reduce((a,b)=>(a<<8)|b,0)>>>0;
  const mask = prefix===0 ? 0 : (0xFFFFFFFF<<(32-prefix))>>>0;
  const netw = (ipNum&mask)>>>0;
  const bcast= (netw|(~mask>>>0))>>>0;
  const n2ip = n=>[24,16,8,0].map(s=>(n>>s)&0xff).join('.');
  return {
    network: n2ip(netw),
    netmask: n2ip(mask),
    broadcast: n2ip(bcast),
    firstHost: prefix>=31 ? n2ip(netw) : n2ip(netw+1),
    lastHost:  prefix>=31 ? n2ip(bcast) : n2ip(bcast-1),
    usable: prefix>=31 ? (prefix===31?2:1) : Math.pow(2,32-prefix)-2,
    prefix
  };
};

/* ══════════════════════════════════════════════════
   UI PRIMITIVES
══════════════════════════════════════════════════ */
const WinPanel = ({title,children,titleRight,style,contentStyle}) => (

      <span>{title}</span>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {titleRight}
        <div className="win-titlebar-btns">
          <div className="win-titlebar-btn">_</div>
          <div className="win-titlebar-btn">□</div>
          <div className="win-titlebar-btn" style={{fontWeight:'bold'}}>✕</div>
        </div>
      </div>
    </div>
    <div className="win-content" style={contentStyle}>{children}</div>
  </div>
);

const Btn = ({onClick,children,cls='',disabled,style}) => (
  <button className={`btn ${cls}`} onClick={onClick} disabled={disabled} style={{opacity:disabled?.5:1,...style}}>
    {children}
  </button>
);

const Terminal = ({lines,style}) => (
  <div className="terminal" style={style}>
    {(lines||[]).join('\n')}
  </div>
);

const HR = () => <hr className="hr-groove"/>;

const CopyBtn = ({text,label='COPY'}) => {
  const [copied,setCopied] = useState(false);
  const doCopy = async () => {
    await copyToClipboard(text);
    setCopied(true);
    setTimeout(()=>setCopied(false),1500);
  };
  return <Btn onClick={doCopy}>{copied?'✓ COPIED':label}</Btn>;
};

/* ══════════════════════════════════════════════════
   EVIDENCE LOG (shared state)
══════════════════════════════════════════════════ */
const useEvidenceLog = () => {
  const [entries, setEntries] = useState(() => {
    try { return JSON.parse(localStorage.getItem('abuse_evidence')||'[]'); } catch { return []; }
  });
  const addEntry = useCallback((content, category='NOTE') => {
    const e = { id: Date.now(), ts: ts(), category, content };
    setEntries(prev => {
      const next = [e,...prev];
      localStorage.setItem('abuse_evidence', JSON.stringify(next));
      return next;
    });
  }, []);
  const removeEntry = useCallback(id => {
    setEntries(prev => {
      const next = prev.filter(e=>e.id!==id);
      localStorage.setItem('abuse_evidence', JSON.stringify(next));
      return next;
    });
  }, []);
  const exportAll = useCallback(() => {
    const txt = entries.map(e=>`[${e.ts}] [${e.category}]\n${e.content}\n${'─'.repeat(60)}`).join('\n');
    copyToClipboard(txt);
  }, [entries]);
  return { entries, addEntry, removeEntry, exportAll };
};

/* ══════════════════════════════════════════════════
   TOOL: URL CHECKER
══════════════════════════════════════════════════ */
const URLChecker = ({ addEntry, setReconIP }) => {
  const [inputText, setInputText] = useState('');
  const [results, setResults] = useState([]);
  const [isChecking, setIsChecking] = useState(false);
  const [copied, setCopied] = useState(false);

  const checkUrl = async (url) => {
    try {
      const res = await fetch('/api/check-url', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({url})
      });
      const data = await res.json();
      if (data.removed===undefined && data.statusCode===undefined)
        return { url, defanged:defang(url), status:'down', code:'ERR', message:'No result' };
      if (data.removed)
        return { url, defanged:defang(url), status:'removed', code:data.statusCode||'N/A', message:data.reason };
      return { url, defanged:defang(url), status:'up', code:data.statusCode, message:'Reachable' };
    } catch(e) {
      return { url, defanged:defang(url), status:'down', code:'ERR', message:e.message };
    }
  };

  const handleCheck = async () => {
    const urls = extractUrls(inputText);
    if (!urls.length) return alert('No URLs found in input.');
    setIsChecking(true); setResults([]);
    const out=[];
    for (const u of urls) {
      const r = await checkUrl(u);
      out.push(r); setResults([...out]);
      await new Promise(r=>setTimeout(r,500));
    }
    setIsChecking(false);
  };

  const exportResults = () => {
    const txt = results.map(r=>`${r.status.toUpperCase()} [${r.code}] ${r.defanged}`).join('\n');
    copyToClipboard(txt); setCopied(true); setTimeout(()=>setCopied(false),1500);
  };

  const addAllToLog = () => {
    const txt = results.map(r=>`${r.status.toUpperCase()} | HTTP ${r.code} | ${r.defanged}\n  Normalized: ${r.url}\n  Reason: ${r.message}`).join('\n\n');
    addEntry(txt, 'URL-CHECK');
  };

  const statusBadge = s => {
    if (s==='up')      return <span className="badge badge-green">▲ UP</span>;
    if (s==='removed') return <span className="badge badge-purple">✕ REMOVED</span>;
    return <span className="badge badge-red">▼ DOWN</span>;
  };

  return (
    <div>
      <div style={{marginBottom:8}}>
        <label style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase',letterSpacing:'.05em'}}>
          Paste Abuse Report / Raw Text:
        </label>
        <textarea
          className="win-textarea"
          rows={7}
          value={inputText}
          onChange={e=>setInputText(e.target.value)}
          placeholder="Paste abuse report here. Defanged URLs (hxxp://, [.]) are auto-normalized."
          style={{marginTop:4}}
        />
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
        <Btn cls="btn-blue" onClick={handleCheck} disabled={isChecking}>
          {isChecking ? '⏳ CHECKING...' : '▶ CHECK URLS'}
        </Btn>
        {results.length>0 && <>
          <Btn onClick={exportResults}>{copied?'✓ COPIED':'📋 EXPORT ALL'}</Btn>
          <Btn cls="btn-green" onClick={addAllToLog}>+ ADD ALL TO LOG</Btn>
        </>}
      </div>

      {results.length > 0 && (
        <WinPanel title={`RESULTS — ${results.length} URLs`}>
          <div style={{display:'grid',gridTemplateColumns:'auto 1fr auto auto',alignItems:'center',gap:'2px 8px',fontFamily:'Courier New',fontSize:11,fontWeight:'bold',padding:'4px 6px',background:'#000080',color:'#fff',marginBottom:4}}>
            <span>STATUS</span><span>DEFANGED URL / NORMALIZED</span><span>HTTP</span><span>ACTIONS</span>
          </div>
          {results.map((r,i)=>(

/* ══════════════════════════════════════════════════
   TOOL: HEADER ANALYZER
══════════════════════════════════════════════════ */
const HeaderAnalyzer = ({ addEntry, setReconIP }) => {
  const [rawHeaders, setRawHeaders] = useState('');
  const [analysis, setAnalysis] = useState(null);

  const parseHeaders = () => {
    const h = rawHeaders;
    const receivedIPs = [];
    const receivedLines = h.match(/^Received:[\s\S]*?(?=^\S)/gim)||[];
    receivedLines.forEach(line=>{
      const ips = line.match(/\b(?:\d{1,3}\.){3}\d{1,3}\b/g)||[];
      ips.forEach(ip=>{ if(!receivedIPs.includes(ip)) receivedIPs.push(ip); });
    });

    const get = (pattern) => { const m = h.match(pattern); return m ? m[1].trim() : null; };
    const spf   = get(/spf=(\S+)/i);
    const dkim  = get(/dkim=(\S+)/i);
    const dmarc = get(/dmarc=(\S+)/i);

    const fromM    = get(/^From:.*?<([^>]+)>/im) || get(/^From:\s*(\S+@\S+)/im);
    const replyToM = get(/^Reply-To:.*?<([^>]+)>/im) || get(/^Reply-To:\s*(\S+@\S+)/im);
    const fromDomain    = fromM    ? fromM.split('@')[1]    : null;
    const replyToDomain = replyToM ? replyToM.split('@')[1] : null;
    const spoofWarning  = fromDomain && replyToDomain && fromDomain.toLowerCase()!==replyToDomain.toLowerCase();

    const subjectM = get(/^Subject:\s*(.*)/im);

    setAnalysis({ receivedIPs, spf, dkim, dmarc, from:fromM, replyTo:replyToM, spoofWarning, subject:subjectM });
  };

  const authBadge = (label, val) => {
    if (!val) return <span className="badge badge-gray">{label}: N/A</span>;
    const pass = val.toLowerCase().startsWith('pass');
    return <span className={`badge ${pass?'badge-green':'badge-red'}`}>{label}: {val.toUpperCase()}</span>;
  };

  return (
    <div>
      <label style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase',letterSpacing:'.05em'}}>
        Raw Email Headers:
      </label>
      <textarea className="win-textarea" rows={9} value={rawHeaders}
        onChange={e=>setRawHeaders(e.target.value)}
        placeholder="Paste raw email headers here (Received:, From:, Reply-To:, DKIM-Signature:, etc.)"
        style={{marginTop:4,marginBottom:8}}
      />
      <div style={{display:'flex',gap:6,marginBottom:8}}>
        <Btn cls="btn-blue" onClick={parseHeaders}>▶ ANALYZE HEADERS</Btn>
        {analysis && <Btn cls="btn-green" onClick={()=>addEntry(`HEADER ANALYSIS\nSubject: ${analysis.subject||'N/A'}\nFrom: ${analysis.from||'N/A'}\nReply-To: ${analysis.replyTo||'N/A'}\nSPF: ${analysis.spf||'N/A'} | DKIM: ${analysis.dkim||'N/A'} | DMARC: ${analysis.dmarc||'N/A'}\nSPOOF: ${analysis.spoofWarning?'YES - MISMATCH':'NO'}\nIPs: ${analysis.receivedIPs.join(', ')}`,'HEADER')}>+ LOG</Btn>}
      </div>

      {analysis && (
        <div>
          {analysis.spoofWarning && (
            <div style={{background:'#880000',color:'#ffff00',border:'2px solid #ff4444',padding:'6px 10px',marginBottom:8,fontWeight:'bold',fontFamily:'Courier New',fontSize:12}}>
              ⚠ SPOOFING DETECTED: From domain [{analysis.from?.split('@')[1]}] ≠ Reply-To domain [{analysis.replyTo?.split('@')[1]}]
            </div>
          )}
          <div className="grid-2" style={{gap:8}}>
            <WinPanel title="AUTH RESULTS">
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {authBadge('SPF',analysis.spf)}
                {authBadge('DKIM',analysis.dkim)}
                {authBadge('DMARC',analysis.dmarc)}
              </div>
            </WinPanel>
            <WinPanel title="SENDER INFO">
              <div style={{fontFamily:'Courier New',fontSize:11,display:'flex',flexDirection:'column',gap:3}}>
                <div><span style={{color:'#808080'}}>Subject: </span>{analysis.subject||'N/A'}</div>
                <div><span style={{color:'#808080'}}>From:    </span>{analysis.from||'N/A'}</div>
                <div><span style={{color:'#808080'}}>Reply-To:</span><span style={{color:analysis.spoofWarning?'#ff0000':'inherit'}}> {analysis.replyTo||'N/A'}</span></div>
              </div>
            </WinPanel>
          </div>
          <div style={{marginTop:8}}>
            <WinPanel title={`RECEIVED CHAIN IPs (${analysis.receivedIPs.length} found)`}>
              {analysis.receivedIPs.length===0
                ? <span style={{color:'#808080',fontFamily:'Courier New',fontSize:11}}>No IPs extracted.</span>
                : <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {analysis.receivedIPs.map((ip,i)=>(
                      <div key={i} style={{display:'flex',gap:4,alignItems:'center'}}>
                        <span className="badge badge-blue">{ip}</span>
                        <Btn style={{fontSize:10,padding:'1px 6px'}} onClick={()=>setReconIP(ip)}>→ RECON</Btn>
                      </div>
                    ))}
                  </div>
              }
            </WinPanel>
          </div>
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════
   TOOL: NETWORK CONFIG GENERATOR
══════════════════════════════════════════════════ */
const NetConfigGen = () => {
  const [iface,  setIface]  = React.useState('eth0');
  const [cidr,   setCidr]   = React.useState('');
  const [os,     setOs]     = React.useState('ubuntu');
  const [result, setResult] = React.useState(null);
  const [error,  setError]  = React.useState('');
  const [copied, setCopied] = React.useState(false);

  const ipToNum = ip => ip.split('.').reduce((a,b)=>(a<<8)|parseInt(b),0)>>>0;
  const numToIp = n => [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');

  const parse = () => {
    const raw = cidr.trim();
    const match = raw.match(/^(\d+\.\d+\.\d+\.\d+)\/(\d+)$/);
    if (!match) { setError('Invalid format. Example: 50.7.60.12/29'); setResult(null); return; }
    const ip   = match[1];
    const prefix = parseInt(match[2]);
    if (prefix < 0 || prefix > 32) { setError('Prefix must be 0–32'); setResult(null); return; }
    const ipNum      = ipToNum(ip);
    const mask       = prefix === 0 ? 0 : (0xFFFFFFFF << (32 - prefix)) >>> 0;
    const netNum     = (ipNum & mask) >>> 0;
    const bcastNum   = (netNum | (~mask >>> 0)) >>> 0;
    const gatewayNum = ipNum - 1;
    const netmask    = numToIp(mask);
    const gateway    = numToIp(gatewayNum);
    const broadcast  = numToIp(bcastNum);
    // usable = ip through last host (ip-1 = gateway, so usable starts at ip)
    const usable = [];
    for (let i = ipNum; i < bcastNum; i++) usable.push(numToIp(i));
    setError('');
    setResult({ ip, prefix, netmask, gateway, broadcast, usable, netNum: numToIp(netNum) });
  };

  const genConfig = () => {
    if (!result) return [];
    const { ip, prefix, netmask, gateway } = result;
    const DNS1 = '1.1.1.1';
    const DNS2 = '8.8.8.8';
    if (os === 'debian') return [
      `# /etc/network/interfaces`,
      `# Debian — ifupdown`,
      ``,
      `auto lo`,
      `iface lo inet loopback`,
      ``,
      `auto ${iface}`,
      `iface ${iface} inet static`,
      `    address ${ip}/${prefix}`,
      `    netmask ${netmask}`,
      `    gateway ${gateway}`,
      `    dns-nameservers ${DNS1} ${DNS2}`,
      ``,
      `# ── Apply ────────────────────────────────`,
      `ifdown ${iface} && ifup ${iface}`,
    ];
    if (os === 'ubuntu') return [
      `# /etc/netplan/00-${iface}.yaml`,
      `# Ubuntu — Netplan (NetworkManager or systemd-networkd)`,
      ``,
      `network:`,
      `  version: 2`,
      `  ethernets:`,
      `    ${iface}:`,
      `      dhcp4: false`,
      `      addresses:`,
      `        - ${ip}/${prefix}`,
      `      routes:`,
      `        - to: default`,
      `          via: ${gateway}`,
      `      nameservers:`,
      `        addresses: [${DNS1}, ${DNS2}]`,
      ``,
      `# ── Apply ────────────────────────────────`,
      `netplan apply`,
    ];
    if (os === 'rhel-nmcli') return [
      `# RHEL / AlmaLinux / Rocky — nmcli`,
      ``,
      `nmcli con add type ethernet ifname ${iface} con-name ${iface}`,
      `nmcli con mod ${iface} ipv4.method manual \\`,
      `    ipv4.addresses ${ip}/${prefix} \\`,
      `    ipv4.gateway ${gateway} \\`,
      `    ipv4.dns "${DNS1} ${DNS2}"`,
      `nmcli con up ${iface}`,
      ``,
      `# ── Verify ───────────────────────────────`,
      `nmcli con show ${iface}`,
      `ip addr show ${iface}`,
    ];
    if (os === 'rhel-file') return [
      `# /etc/sysconfig/network-scripts/ifcfg-${iface}`,
      `# RHEL / AlmaLinux / Rocky — legacy ifcfg`,
      ``,
      `TYPE=Ethernet`,
      `BOOTPROTO=none`,
      `NAME=${iface}`,
      `DEVICE=${iface}`,
      `ONBOOT=yes`,
      `IPADDR=${ip}`,
      `PREFIX=${prefix}`,
      `GATEWAY=${gateway}`,
      `DNS1=${DNS1}`,
      `DNS2=${DNS2}`,
      ``,
      `# ── Apply ────────────────────────────────`,
      `nmcli con reload`,
      `nmcli con up ${iface}`,
    ];
    if (os === 'systemd-networkd') return [
      `# /etc/systemd/network/10-${iface}.network`,
      `# systemd-networkd`,
      ``,
      `[Match]`,
      `Name=${iface}`,
      ``,
      `[Network]`,
      `Address=${ip}/${prefix}`,
      `Gateway=${gateway}`,
      `DNS=${DNS1}`,
      `DNS=${DNS2}`,
      ``,
      `# ── Apply ────────────────────────────────`,
      `systemctl restart systemd-networkd`,
      `networkctl status ${iface}`,
    ];
    return [];
  };

  const lines = genConfig();

  const doCopy = () => {
    const txt = lines.join('\n');
    const el = document.createElement('textarea');
    el.value = txt; document.body.appendChild(el);
    el.select(); document.execCommand('copy');
    document.body.removeChild(el);
    setCopied(true); setTimeout(()=>setCopied(false),1500);
  };

  const OS_OPTS = [
    { id:'ubuntu',            label:'Ubuntu (Netplan)' },
    { id:'debian',            label:'Debian (interfaces)' },
    { id:'rhel-nmcli',        label:'RHEL/Alma/Rocky (nmcli)' },
    { id:'rhel-file',         label:'RHEL/Alma/Rocky (ifcfg)' },
    { id:'systemd-networkd',  label:'systemd-networkd' },
  ];

  return (
    <div>
      <div style={{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap',alignItems:'flex-end'}}>
        <div>
          <div style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase',marginBottom:3}}>Interface</div>
          <input className="win-input" style={{width:110}} value={iface}
            onChange={e=>setIface(e.target.value)} placeholder="eth0"
            onKeyDown={e=>e.key==='Enter'&&parse()}
          />
        </div>
        <div>
          <div style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase',marginBottom:3}}>IP / CIDR</div>
          <input className="win-input" style={{width:180}} value={cidr}
            onChange={e=>setCidr(e.target.value)} placeholder="50.7.60.12/29"
            onKeyDown={e=>e.key==='Enter'&&parse()}
          />
        </div>
        <Btn cls="btn-blue" onClick={parse}>▶ GENERATE</Btn>
        {lines.length > 0 && (
          <Btn cls={copied?'btn-green':''} onClick={doCopy}>{copied?'✓ COPIED':'📋 COPY'}</Btn>
        )}
      </div>

      <div style={{display:'flex',gap:4,marginBottom:8,flexWrap:'wrap'}}>
        {OS_OPTS.map(o=>(
          <Btn key={o.id} cls={os===o.id?'btn-blue':''} onClick={()=>setOs(o.id)}>{o.label}</Btn>
        ))}
      </div>

      {error && <div style={{color:'#880000',fontWeight:'bold',marginBottom:8,fontFamily:'Courier New',fontSize:12}}>{error}</div>}

      {result && (
        <div className="grid-2" style={{gap:8}}>
          <div>
            <div style={{border:'2px solid #808080',background:'#fff',marginBottom:8}}>
              <div style={{background:'#000080',color:'#fff',padding:'3px 8px',fontWeight:'bold',fontSize:12,fontFamily:'Courier New'}}>
                NETWORK INFO
              </div>
              {[
                ['Assigned IP',  `${result.ip}/${result.prefix}`],
                ['Netmask',      result.netmask],
                ['Gateway',      result.gateway],
                ['Broadcast',    result.broadcast],
                ['DNS',          '1.1.1.1, 8.8.8.8'],
                ['Usable IPs',   result.usable.join(', ')],
              ].map(([label,val],i)=>(
                <div key={i} style={{display:'grid',gridTemplateColumns:'130px 1fr',borderBottom:'1px solid #C0C0C0',background:i%2?'#f8f8f8':'#fff'}}>
                  <div style={{padding:'4px 8px',fontWeight:'bold',fontSize:11,borderRight:'1px solid #C0C0C0',color:'#000080',textTransform:'uppercase'}}>{label}</div>
                  <div style={{padding:'4px 8px',fontFamily:'Courier New',fontSize:11,wordBreak:'break-all'}}>{val}</div>
                </div>
              ))}
            </div>
          </div>
          <Terminal lines={lines} style={{minHeight:220}}/>
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════
   TOOL: ACL BUILDER
══════════════════════════════════════════════════ */
const ACLBuilder = () => {
  const [input, setInput] = useState('');
  const [format, setFormat] = useState('iptables');

  const items = input.split('\n').map(s=>s.trim()).filter(Boolean);

  const genIPTables = () => {
    if (!items.length) return ['# Enter IPs or CIDRs above (one per line)'];
    return [
      `# ── BLOCK RULES ─────────────────────────`,
      ...items.map(ip=>`iptables -I INPUT -s ${ip} -j DROP`),
      `iptables -I FORWARD -s ${ip_placeholder} -j DROP`,
      ``,
      `# ── SAVE RULES ──────────────────────────`,
      `iptables-save > /etc/iptables/rules.v4`,
      `service iptables save`,
      ``,
      `# ── REMOVE RULES ────────────────────────`,
      ...items.map(ip=>`iptables -D INPUT -s ${ip} -j DROP`),
      ``,
      `# ── VERIFY ───────────────────────────────`,
      `iptables -L INPUT -n --line-numbers | grep DROP`,
    ].map(l=>l.replace('${ip_placeholder}', items[0]||'<IP>'));
  };

  const genNFTables = () => {
    if (!items.length) return ['# Enter IPs or CIDRs above'];
    return [
      `# ── CREATE SET & ADD RULES ───────────────`,
      `nft add table inet abuse_block`,
      `nft add chain inet abuse_block input '{ type filter hook input priority 0; policy accept; }'`,
      `nft add set inet abuse_block blocklist '{ type ipv4_addr; flags interval; }'`,
      ``,
      `# ── ADD IPs TO SET ───────────────────────`,
      ...items.map(ip=>`nft add element inet abuse_block blocklist { ${ip} }`),
      ``,
      `# ── APPLY RULE ───────────────────────────`,
      `nft add rule inet abuse_block input ip saddr @blocklist drop`,
      ``,
      `# ── LIST / VERIFY ────────────────────────`,
      `nft list set inet abuse_block blocklist`,
      `nft list ruleset`,
      ``,
      `# ── REMOVE ───────────────────────────────`,
      ...items.map(ip=>`nft delete element inet abuse_block blocklist { ${ip} }`),
    ];
  };

  const genUFW = () => {
    if (!items.length) return ['# Enter IPs or CIDRs above'];
    return [
      `# ── BLOCK ───────────────────────────────`,
      ...items.map(ip=>`ufw deny from ${ip} to any`),
      ``,
      `# ── VERIFY ──────────────────────────────`,
      `ufw status numbered`,
      ``,
      `# ── REMOVE (use rule number from status) ──`,
      ...items.map((_,i)=>`ufw delete <rule_number_for_${items[i]}>`),
      ``,
      `# ── RELOAD ──────────────────────────────`,
      `ufw reload`,
    ];
  };

  const lines = format==='iptables' ? genIPTables() : format==='nftables' ? genNFTables() : genUFW();

  return (
    <div>
      <div style={{display:'flex',gap:8,marginBottom:8,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase'}}>Format:</span>
        {['iptables','nftables','ufw'].map(f=>(
          <Btn key={f} cls={format===f?'btn-blue':''} onClick={()=>setFormat(f)}>{f}</Btn>
        ))}
        <CopyBtn text={lines.join('\n')}/>
      </div>
      <div className="grid-2" style={{gap:8}}>
        <div>
          <label style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase',display:'block',marginBottom:4}}>IPs / CIDRs (one per line):</label>
          <textarea className="win-textarea" rows={12} value={input}
            onChange={e=>setInput(e.target.value)}
            placeholder={"192.168.1.1\n10.0.0.0/8\n2001:db8::1"}
          />
          <div style={{marginTop:4,fontSize:11,color:'#808080'}}>{items.length} entr{items.length===1?'y':'ies'}</div>
        </div>
        <Terminal lines={lines} style={{minHeight:220,height:'100%'}}/>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════
   TOOL: WHOIS LOOKUP
══════════════════════════════════════════════════ */
const WhoisLookup = () => {
  const [query, setQuery] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const lookup = async () => {
    const q = query.trim();
    if (!q) return;
    setLoading(true); setResult(null); setError('');
    try {
      // Use RDAP for IPs, whois.arin.net JSON for domains
      const isIP = /^\d{1,3}(\.\d{1,3}){3}$/.test(q);
      let url = isIP
        ? `https://rdap.arin.net/registry/ip/${q}`
        : `https://rdap.verisign.com/com/v1/domain/${q}`;
      let res = await fetch(url);
      if (!res.ok && !isIP) {
        // fallback to IANA RDAP bootstrap
        res = await fetch(`https://rdap.org/domain/${q}`);
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      setResult({ raw: data, isIP, query: q });
    } catch(e) {
      setError(`RDAP lookup failed: ${e.message}. Use: whois ${q}`);
    }
    setLoading(false);
  };

  const renderIP = (d) => {
    const name   = d.name || 'N/A';
    const handle = d.handle || 'N/A';
    const org    = d.entities?.find(e=>e.roles?.includes('registrant'));
    const orgName= org?.vcardArray?.[1]?.find(v=>v[0]==='fn')?.[3] || org?.handle || 'N/A';
    const abuse  = d.entities?.flatMap(e=>e.entities||[]).find(e=>e.roles?.includes('abuse'));
    const abuseEmail = abuse?.vcardArray?.[1]?.find(v=>v[0]==='email')?.[3] || 'N/A';
    const country= d.country || 'N/A';
    const startAddr = d.startAddress || 'N/A';
    const endAddr   = d.endAddress   || 'N/A';
    const cidr   = d.cidr0_cidrs?.[0] ? `${d.cidr0_cidrs[0].v4prefix}/${d.cidr0_cidrs[0].length}` : 'N/A';
    const rows = [
      ['Handle', handle], ['Name', name], ['Organization', orgName],
      ['Country', country], ['CIDR', cidr],
      ['Start IP', startAddr], ['End IP', endAddr],
      ['Abuse Contact', abuseEmail],
    ];
    return rows;
  };

  const renderDomain = (d) => {
    const registrant = d.entities?.find(e=>e.roles?.includes('registrant'));
    const registrar  = d.entities?.find(e=>e.roles?.includes('registrar'));
    const getVcard = (e, field) => e?.vcardArray?.[1]?.find(v=>v[0]===field)?.[3] || 'N/A';
    const events = {};
    (d.events||[]).forEach(ev=>{ events[ev.eventAction]=ev.eventDate?.slice(0,10)||'N/A'; });
    const rows = [
      ['Domain', d.ldhName || d.unicodeName || 'N/A'],
      ['Status', (d.status||[]).join(', ') || 'N/A'],
      ['Registrar', getVcard(registrar,'fn')],
      ['Registrant', getVcard(registrant,'fn')],
      ['Registrant Email', getVcard(registrant,'email')],
      ['Registered', events['registration'] || 'N/A'],
      ['Updated', events['last changed'] || 'N/A'],
      ['Expires', events['expiration'] || 'N/A'],
      ['Nameservers', (d.nameservers||[]).map(n=>n.ldhName).join(', ') || 'N/A'],
    ];
    return rows;
  };

  const rows = result ? (result.isIP ? renderIP(result.raw) : renderDomain(result.raw)) : [];
  const cmdLine = `whois ${query.trim()}`;

  return (
    <div>
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <input className="win-input" style={{maxWidth:300}} value={query}
          onChange={e=>setQuery(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&lookup()}
          placeholder="e.g. 1.2.3.4 or example.com"
        />
        <Btn cls="btn-blue" onClick={lookup} disabled={loading}>
          {loading ? '⏳ LOOKING UP...' : '▶ WHOIS LOOKUP'}
        </Btn>
        {result && <CopyBtn text={rows.map(([k,v])=>`${k}: ${v}`).join('\n')} label="COPY"/>}
      </div>

      {error && (
        <div>
          <div style={{color:'#880000',fontWeight:'bold',marginBottom:8,fontFamily:'Courier New',fontSize:12}}>{error}</div>
          <Terminal lines={[cmdLine]}/>
        </div>
      )}

      {result && (
        <div className="grid-2" style={{gap:8}}>
          <div style={{border:'2px solid #808080',background:'#fff'}}>
            <div style={{background:'#000080',color:'#fff',padding:'3px 8px',fontWeight:'bold',fontSize:12,fontFamily:'Courier New'}}>
              {result.isIP ? 'IP RDAP RESULT' : 'DOMAIN RDAP RESULT'} — {result.query}
            </div>
            {rows.map(([label,val],i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns:'160px 1fr',borderBottom:'1px solid #C0C0C0',background:i%2?'#f8f8f8':'#fff'}}>
                <div style={{padding:'4px 8px',fontWeight:'bold',fontSize:11,borderRight:'1px solid #C0C0C0',color:'#000080',textTransform:'uppercase'}}>{label}</div>
                <div style={{padding:'4px 8px',fontFamily:'Courier New',fontSize:11,wordBreak:'break-all'}}>{val}</div>
              </div>
            ))}
          </div>
          <div>
            <WinPanel title="CLI EQUIVALENT">
              <Terminal lines={[cmdLine, ``, `# RDAP (JSON):`, `curl -s https://rdap.org/${result.isIP?'ip':'domain'}/${result.query} | python3 -m json.tool`]}/>
            </WinPanel>
          </div>
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════
   TOOL: ABUSE CONTACT FINDER
══════════════════════════════════════════════════ */
const AbuseContactFinder = () => {
  const [query, setQuery] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const lookup = async () => {
    const q = query.trim();
    if (!q) return;
    setLoading(true); setResult(null); setError('');
    try {
      const isIP = /^\d{1,3}(\.\d{1,3}){3}$/.test(q);
      const url = isIP
        ? `https://rdap.arin.net/registry/ip/${q}`
        : `https://rdap.org/domain/${q}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      // Walk all entities recursively for abuse contact
      const allEntities = [];
      const walk = (entities) => {
        (entities||[]).forEach(e => { allEntities.push(e); walk(e.entities); });
      };
      walk(data.entities);

      const abuseEnt = allEntities.find(e=>e.roles?.includes('abuse'));
      const getVcard = (e, f) => e?.vcardArray?.[1]?.find(v=>v[0]===f)?.[3];
      const email  = getVcard(abuseEnt,'email') || 'Not found';
      const phone  = getVcard(abuseEnt,'tel')   || 'Not found';
      const name   = getVcard(abuseEnt,'fn')    || abuseEnt?.handle || 'Not found';
      const org    = allEntities.find(e=>e.roles?.includes('registrant'));
      const orgName= getVcard(org,'fn') || org?.handle || 'N/A';
      const handle = data.handle || 'N/A';
      const netName= data.name   || 'N/A';

      setResult({ email, phone, name, orgName, handle, netName, isIP, query: q });
    } catch(e) {
      setError(`Lookup failed: ${e.message}`);
    }
    setLoading(false);
  };

  const found = result && result.email !== 'Not found';

  return (
    <div>
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <input className="win-input" style={{maxWidth:300}} value={query}
          onChange={e=>setQuery(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&lookup()}
          placeholder="e.g. 1.2.3.4 or domain.com"
        />
        <Btn cls="btn-blue" onClick={lookup} disabled={loading}>
          {loading ? '⏳ LOOKING UP...' : '▶ FIND ABUSE CONTACT'}
        </Btn>
      </div>

      {error && <div style={{color:'#880000',fontWeight:'bold',fontFamily:'Courier New',fontSize:12,marginBottom:8}}>{error}</div>}

      {result && (
        <div className="grid-2" style={{gap:8}}>
          <WinPanel title={`ABUSE CONTACT — ${result.query}`}>
            <div style={{marginBottom:8}}>
              <span className={`badge ${found?'badge-green':'badge-red'}`}>
                {found ? '✓ CONTACT FOUND' : '✕ NO ABUSE CONTACT'}
              </span>
            </div>
            {[
              ['Organization', result.orgName],
              ['Network', result.netName],
              ['Handle', result.handle],
              ['Abuse Contact Name', result.name],
              ['Abuse Email', result.email],
              ['Abuse Phone', result.phone],
            ].map(([label,val],i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns:'160px 1fr',borderBottom:'1px solid #C0C0C0',background:i%2?'#f8f8f8':'#fff'}}>
                <div style={{padding:'4px 8px',fontWeight:'bold',fontSize:11,borderRight:'1px solid #C0C0C0',color:'#000080',textTransform:'uppercase'}}>{label}</div>
                <div style={{padding:'4px 8px',fontFamily:'Courier New',fontSize:11,wordBreak:'break-all',color:label==='Abuse Email'&&found?'#000080':'#000'}}>{val}</div>
              </div>
            ))}
            {found && (
              <div style={{marginTop:8,display:'flex',gap:6}}>
                <CopyBtn text={result.email} label="COPY EMAIL"/>
                <CopyBtn text={`To: ${result.email}\nSubject: Abuse Report — ${result.query}\n\nHello,\n\nWe are reporting abuse originating from ${result.query} under your network.\n\n--\nFDCServers Abuse Department\nabuse@fdcservers.net`} label="COPY DRAFT"/>
              </div>
            )}
          </WinPanel>
          <WinPanel title="CLI LOOKUP">
            <Terminal lines={[
              `# RDAP abuse contact lookup:`,
              `curl -s https://rdap.arin.net/registry/ip/${result.query} \\`,
              `  | python3 -m json.tool | grep -i abuse`,
              ``,
              `# Direct WHOIS:`,
              `whois ${result.query} | grep -i abuse`,
              ``,
              `# ARIN abuse report form:`,
              `# https://www.arin.net/resources/registry/abuse/`,
            ]}/>
          </WinPanel>
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════
   TOOL: URL DEFANGER / REFANGER
══════════════════════════════════════════════════ */
const DefangTool = () => {
  const [input, setInput] = useState('');
  const [mode, setMode] = useState('defang');

  const process = (text) => {
    if (!text.trim()) return '';
    const lines = text.split('\n');
    return lines.map(line => {
      if (mode === 'defang') {
        return line
          .replace(/https:\/\//gi, 'hxxps://')
          .replace(/http:\/\//gi,  'hxxp://')
          .replace(/\./g, '[.]')
          .replace(/:/g, '[:]');
      } else {
        return line
          .replace(/hxxps:\/\//gi, 'https://')
          .replace(/hxxp:\/\//gi,  'http://')
          .replace(/\[\.\]|\(\.\)/g, '.')
          .replace(/\[:\]/g, ':');
      }
    }).join('\n');
  };

  const output = process(input);

  return (
    <div>
      <div style={{display:'flex',gap:6,marginBottom:8,alignItems:'center'}}>
        <span style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase'}}>Mode:</span>
        <Btn cls={mode==='defang'?'btn-blue':''} onClick={()=>setMode('defang')}>DEFANG (safe for sharing)</Btn>
        <Btn cls={mode==='refang'?'btn-blue':''} onClick={()=>setMode('refang')}>REFANG (restore URLs)</Btn>
      </div>
      <div className="grid-2" style={{gap:8}}>
        <div>
          <label style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase',display:'block',marginBottom:4}}>
            {mode==='defang' ? 'RAW INPUT (live URLs / IPs):' : 'DEFANGED INPUT:'}
          </label>
          <textarea className="win-textarea" rows={14} value={input}
            onChange={e=>setInput(e.target.value)}
            placeholder={mode==='defang'
              ? 'https://evil.com/phish\n192.168.1.1'
              : 'hxxps://evil[.]com/phish\n192[.]168[.]1[.]1'}
          />
        </div>
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <label style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase'}}>
              {mode==='defang' ? 'DEFANGED OUTPUT:' : 'REFANGED OUTPUT:'}
            </label>
            <CopyBtn text={output}/>
          </div>
          <div className="terminal" style={{minHeight:242,whiteSpace:'pre-wrap',wordBreak:'break-all'}}>
            {output || '# Output will appear here'}
          </div>
        </div>
      </div>
      <div style={{marginTop:8,fontSize:11,color:'#808080',fontFamily:'Courier New'}}>
        ■ DEFANG: Converts URLs to safe-to-share IOC format (hxxps://, [.], [:]) |
        ■ REFANG: Restores IOCs to working URLs for analysis
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════
   TOOL: BASE64 / URL DECODE
══════════════════════════════════════════════════ */
const DecodeTool = () => {
  const [input, setInput] = useState('');
  const [mode, setMode] = useState('b64decode');

  const MODES = [
    { id:'b64decode', label:'Base64 Decode' },
    { id:'b64encode', label:'Base64 Encode' },
    { id:'urldecode', label:'URL Decode' },
    { id:'urlencode', label:'URL Encode' },
    { id:'hexdecode', label:'Hex Decode' },
    { id:'htmldecode', label:'HTML Entity Decode' },
  ];

  const process = () => {
    const t = input.trim();
    if (!t) return '';
    try {
      switch(mode) {
        case 'b64decode': {
          const bin = atob(t);
          // Try UTF-8 decode
          try {
            return decodeURIComponent(escape(bin));
          } catch { return bin; }
        }
        case 'b64encode': return btoa(unescape(encodeURIComponent(t)));
        case 'urldecode': return decodeURIComponent(t.replace(/\+/g,' '));
        case 'urlencode': return encodeURIComponent(t);
        case 'hexdecode': {
          const hex = t.replace(/\s+/g,'').replace(/^0x/i,'');
          if (!/^[0-9a-fA-F]+$/.test(hex)) return '⚠ Invalid hex string';
          let out='';
          for(let i=0;i<hex.length;i+=2) out+=String.fromCharCode(parseInt(hex.substr(i,2),16));
          return out;
        }
        case 'htmldecode': {
          const txt = document.createElement('textarea');
          txt.innerHTML = t;
          return txt.value;
        }
        default: return t;
      }
    } catch(e) {
      return `⚠ Error: ${e.message}`;
    }
  };

  const output = process();
  const isError = output.startsWith('⚠');

  // Detect if output looks like another encoded layer
  const looksB64 = /^[A-Za-z0-9+/]{16,}={0,2}$/.test(output.trim());
  const looksUrl = output.includes('%');
  const layerHint = !isError && (looksB64 ? '■ Output may contain another Base64 layer' : looksUrl ? '■ Output may contain URL-encoded content' : '');

  return (
    <div>
      <div style={{display:'flex',gap:4,marginBottom:8,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase',marginRight:4}}>Mode:</span>
        {MODES.map(m=>(
          <Btn key={m.id} cls={mode===m.id?'btn-blue':''} onClick={()=>setMode(m.id)} style={{fontSize:11,padding:'3px 10px'}}>{m.label}</Btn>
        ))}
      </div>
      <div className="grid-2" style={{gap:8}}>
        <div>
          <label style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase',display:'block',marginBottom:4}}>INPUT:</label>
          <textarea className="win-textarea" rows={14} value={input} onChange={e=>setInput(e.target.value)}
            placeholder={mode==='b64decode'?'Paste Base64 encoded string...':
              mode==='urldecode'?'Paste URL-encoded string... (%20, %3A, etc.)':
              mode==='hexdecode'?'Paste hex string... (0x414243 or 41 42 43)':
              mode==='htmldecode'?'Paste HTML with entities... (&amp; &lt; etc.)':
              'Paste text to encode...'}
          />
        </div>
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <label style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase'}}>OUTPUT:</label>
            {!isError && <CopyBtn text={output}/>}
          </div>
          <div className="terminal" style={{minHeight:242,whiteSpace:'pre-wrap',wordBreak:'break-all',color:isError?'#ff4444':'#00ff00'}}>
            {output || '# Output will appear here'}
          </div>
          {layerHint && (
            <div style={{marginTop:4,fontFamily:'Courier New',fontSize:11,color:'#ffff00',background:'#444400',padding:'3px 6px',border:'1px solid #888800'}}>
              {layerHint}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════
   TOOL: HASH CHECKER
══════════════════════════════════════════════════ */
const HashChecker = () => {
  const [input, setInput] = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);

  const HASH_PATTERNS = {
    MD5:    /\b[a-fA-F0-9]{32}\b/g,
    SHA1:   /\b[a-fA-F0-9]{40}\b/g,
    SHA256: /\b[a-fA-F0-9]{64}\b/g,
    SHA512: /\b[a-fA-F0-9]{128}\b/g,
  };

  const extractHashes = (text) => {
    const found = [];
    const seen = new Set();
    Object.entries(HASH_PATTERNS).forEach(([type, re]) => {
      const matches = [...new Set(text.match(re)||[])];
      matches.forEach(h => {
        if (!seen.has(h)) { seen.add(h); found.push({ hash: h, type }); }
      });
    });
    return found;
  };

  const checkHashes = async () => {
    const hashes = extractHashes(input);
    if (!hashes.length) { alert('No hashes detected in input.'); return; }
    setLoading(true);
    setResults(hashes.map(h => ({ ...h, status: 'checking', vtUrl: null, malicious: null, total: null })));

    const checked = [];
    for (const h of hashes) {
      // VirusTotal public API (no key needed for basic lookup via public report URL)
      const vtUrl = `https://www.virustotal.com/gui/file/${h.hash}`;
      // We can't call VT API without a key, so we generate the lookup URLs instead
      const otxUrl = `https://otx.alienvault.com/indicator/file/${h.hash}`;
      const mbUrl  = `https://www.malwarebazaar.org/browse.php?search[tag]=${h.hash}`;
      checked.push({ ...h, status: 'lookup-ready', vtUrl, otxUrl, mbUrl });
      setResults([...checked]);
    }
    setLoading(false);
  };

  // Hash the current input text client-side
  const [hashOutput, setHashOutput] = useState({});
  const computeHashes = async () => {
    const enc = new TextEncoder().encode(input);
    const algs = [['SHA-1','sha1'],['SHA-256','sha256'],['SHA-512','sha512']];
    const out = {};
    for (const [alg, key] of algs) {
      const buf = await crypto.subtle.digest(alg, enc);
      out[key] = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }
    setHashOutput(out);
    setResults([]);
  };

  return (
    <div>
      <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
        <Btn cls="btn-blue" onClick={checkHashes} disabled={loading}>
          {loading ? '⏳ EXTRACTING...' : '▶ EXTRACT & CHECK HASHES'}
        </Btn>
        <Btn cls="btn-purple" onClick={computeHashes}>
          ⚡ COMPUTE HASHES OF INPUT TEXT
        </Btn>
      </div>

      <div className="grid-2" style={{gap:8,marginBottom:8}}>
        <div>
          <label style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase',display:'block',marginBottom:4}}>
            INPUT (paste hashes or text to hash):
          </label>
          <textarea className="win-textarea" rows={8} value={input} onChange={e=>setInput(e.target.value)}
            placeholder="Paste MD5/SHA1/SHA256/SHA512 hashes or any text to compute its hash..."
          />
        </div>
        {Object.keys(hashOutput).length > 0 && (
          <WinPanel title="COMPUTED HASHES (of input text)">
            {[['SHA-1','sha1'],['SHA-256','sha256'],['SHA-512','sha512']].map(([label,key])=>(
              <div key={key} style={{marginBottom:6}}>
                <div style={{fontWeight:'bold',fontSize:11,color:'#000080',marginBottom:2}}>{label}</div>
                <div style={{fontFamily:'Courier New',fontSize:11,wordBreak:'break-all',background:'#f0f0f0',padding:'3px 6px',border:'1px solid #C0C0C0'}}>
                  {hashOutput[key]}
                </div>
                <CopyBtn text={hashOutput[key]} label={`COPY ${label}`}/>
              </div>
            ))}
          </WinPanel>
        )}
      </div>

      {results.length > 0 && (
        <WinPanel title={`HASH LOOKUP — ${results.length} hash(es) found`}>
          <div style={{marginBottom:6,fontFamily:'Courier New',fontSize:11,color:'#808080'}}>
            ■ No API key required — links open directly in threat intel platforms
          </div>
          {results.map((r,i)=>(
            <div key={i} className="result-row" style={{marginBottom:6}}>
              <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:4,flexWrap:'wrap'}}>
                <span className="badge badge-purple">{r.type}</span>
                <span style={{fontFamily:'Courier New',fontSize:11,wordBreak:'break-all',color:'#000080'}}>{r.hash}</span>
              </div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                <a href={r.vtUrl} target="_blank" rel="noopener" style={{fontSize:11}}>🔍 VirusTotal</a>
                <a href={r.otxUrl} target="_blank" rel="noopener" style={{fontSize:11}}>🔍 AlienVault OTX</a>
                <a href={r.mbUrl} target="_blank" rel="noopener" style={{fontSize:11}}>🔍 MalwareBazaar</a>
                <CopyBtn text={r.hash} label="COPY HASH"/>
              </div>
            </div>
          ))}
        </WinPanel>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════
   TOOL: EMAIL HEADER PARSER (advanced)
══════════════════════════════════════════════════ */
const EmailHeaderParser = ({ addEntry, setReconIP }) => {
  const [raw, setRaw] = useState('');
  const [parsed, setParsed] = useState(null);

  const parse = () => {
    const h = raw;
    const get = (re) => { const m = h.match(re); return m?m[1].trim():null; };
    const getAll = (re) => { const m=[...h.matchAll(re)]; return m.map(x=>x[1].trim()); };

    // Received chain
    const receivedBlocks = [];
    const rcvRe = /^(Received:[\s\S]*?)(?=^\S)/gim;
    let m;
    while((m=rcvRe.exec(h))!==null) {
      const block = m[1];
      const ips = [...new Set(block.match(/\b(?:\d{1,3}\.){3}\d{1,3}\b/g)||[])];
      const byHost = block.match(/by\s+(\S+)/i)?.[1] || null;
      const fromHost = block.match(/from\s+(\S+)/i)?.[1] || null;
      const dateM = block.match(/;\s*(.+)$/m)?.[1]?.trim() || null;
      receivedBlocks.push({ ips, byHost, fromHost, date: dateM, raw: block.trim() });
    }

    const spf    = get(/spf=(\S+)/i);
    const dkim   = get(/dkim=(\S+)/i);
    const dmarc  = get(/dmarc=(\S+)/i);
    const from   = get(/^From:.*?<([^>]+)>/im) || get(/^From:\s*(\S+@\S+)/im);
    const to     = get(/^To:.*?<([^>]+)>/im)   || get(/^To:\s*(\S+@\S+)/im);
    const replyTo= get(/^Reply-To:.*?<([^>]+)>/im) || get(/^Reply-To:\s*(\S+@\S+)/im);
    const subject= get(/^Subject:\s*(.*)/im);
    const msgId  = get(/^Message-ID:\s*<?([^>\s]+)/im);
    const xMailer= get(/^X-Mailer:\s*(.*)/im);
    const xOrigIP= get(/^X-Originating-IP:\s*([\d.]+)/im);
    const contentType = get(/^Content-Type:\s*(.*)/im);

    const fromDomain    = from?.split('@')[1];
    const replyToDomain = replyTo?.split('@')[1];
    const spoofWarning  = fromDomain && replyToDomain && fromDomain.toLowerCase()!==replyToDomain.toLowerCase();

    // Return-path mismatch
    const returnPath = get(/^Return-Path:.*?<([^>]+)>/im) || get(/^Return-Path:\s*(\S+@\S+)/im);
    const returnPathDomain = returnPath?.split('@')[1];
    const returnMismatch = fromDomain && returnPathDomain && fromDomain.toLowerCase()!==returnPathDomain.toLowerCase();

    const allIPs = [...new Set(receivedBlocks.flatMap(b=>b.ips))];
    if (xOrigIP && !allIPs.includes(xOrigIP)) allIPs.unshift(xOrigIP);

    setParsed({ receivedBlocks, spf, dkim, dmarc, from, to, replyTo, subject, msgId, xMailer, xOrigIP,
                contentType, spoofWarning, returnMismatch, returnPath, fromDomain, replyToDomain, allIPs });
  };

  const authBadge = (label, val) => {
    if (!val) return <span className="badge badge-gray">{label}: N/A</span>;
    const pass = val.toLowerCase().startsWith('pass');
    return <span className={`badge ${pass?'badge-green':'badge-red'}`}>{label}: {val.toUpperCase()}</span>;
  };

  const logEntry = () => {
    if (!parsed) return;
    const txt = [
      `EMAIL HEADER ANALYSIS`,
      `Subject: ${parsed.subject||'N/A'}`,
      `From: ${parsed.from||'N/A'}`,
      `To: ${parsed.to||'N/A'}`,
      `Reply-To: ${parsed.replyTo||'N/A'}`,
      `Return-Path: ${parsed.returnPath||'N/A'}`,
      `SPF: ${parsed.spf||'N/A'} | DKIM: ${parsed.dkim||'N/A'} | DMARC: ${parsed.dmarc||'N/A'}`,
      `Spoofing: ${parsed.spoofWarning?'YES - FROM/REPLY-TO MISMATCH':'NO'}`,
      `Return-Path Mismatch: ${parsed.returnMismatch?'YES':'NO'}`,
      `X-Originating-IP: ${parsed.xOrigIP||'N/A'}`,
      `IPs in chain: ${parsed.allIPs.join(', ')||'none'}`,
    ].join('\n');
    addEntry(txt, 'HEADER');
  };

  return (
    <div>
      <label style={{fontWeight:'bold',fontSize:11,textTransform:'uppercase'}}>Raw Email Headers:</label>
      <textarea className="win-textarea" rows={8} value={raw} onChange={e=>setRaw(e.target.value)}
        placeholder="Paste full raw email headers here..."
        style={{marginTop:4,marginBottom:8}}
      />
      <div style={{display:'flex',gap:6,marginBottom:8}}>
        <Btn cls="btn-blue" onClick={parse}>▶ PARSE HEADERS</Btn>
        {parsed && <Btn cls="btn-green" onClick={logEntry}>+ LOG TO EVIDENCE</Btn>}
      </div>

      {parsed && (
        <div>
          {(parsed.spoofWarning || parsed.returnMismatch) && (
            <div style={{background:'#880000',color:'#ffff00',border:'2px solid #ff4444',padding:'6px 10px',marginBottom:8,fontWeight:'bold',fontFamily:'Courier New',fontSize:12}}>
              {parsed.spoofWarning && <div>⚠ SPOOF: From [{parsed.fromDomain}] ≠ Reply-To [{parsed.replyToDomain}]</div>}
              {parsed.returnMismatch && <div>⚠ RETURN-PATH MISMATCH: From [{parsed.fromDomain}] ≠ Return-Path [{parsed.returnPath?.split('@')[1]}]</div>}
            </div>
          )}

          <div className="grid-2" style={{gap:8,marginBottom:8}}>
            <WinPanel title="AUTH RESULTS">
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {authBadge('SPF',parsed.spf)}
                {authBadge('DKIM',parsed.dkim)}
                {authBadge('DMARC',parsed.dmarc)}
              </div>
            </WinPanel>
            <WinPanel title="SENDER INFO">
              <div style={{fontFamily:'Courier New',fontSize:11,display:'flex',flexDirection:'column',gap:3}}>
                <div><span style={{color:'#808080'}}>Subject:     </span>{parsed.subject||'N/A'}</div>
                <div><span style={{color:'#808080'}}>From:        </span>{parsed.from||'N/A'}</div>
                <div><span style={{color:'#808080'}}>To:          </span>{parsed.to||'N/A'}</div>
                <div><span style={{color:'#808080'}}>Reply-To:    </span><span style={{color:parsed.spoofWarning?'#ff0000':'inherit'}}>{parsed.replyTo||'N/A'}</span></div>
                <div><span style={{color:'#808080'}}>Return-Path: </span><span style={{color:parsed.returnMismatch?'#ff0000':'inherit'}}>{parsed.returnPath||'N/A'}</span></div>
                <div><span style={{color:'#808080'}}>X-Orig-IP:   </span>{parsed.xOrigIP||'N/A'}</div>
                <div><span style={{color:'#808080'}}>X-Mailer:    </span>{parsed.xMailer||'N/A'}</div>
                <div><span style={{color:'#808080'}}>Message-ID:  </span><span style={{wordBreak:'break-all'}}>{parsed.msgId||'N/A'}</span></div>
              </div>
            </WinPanel>
          </div>

          <WinPanel title={`RECEIVED CHAIN — ${parsed.receivedBlocks.length} hop(s) | ${parsed.allIPs.length} unique IP(s)`}>
            {parsed.allIPs.length > 0 && (
              <div style={{marginBottom:8,display:'flex',flexWrap:'wrap',gap:4,alignItems:'center'}}>
                <span style={{fontWeight:'bold',fontSize:11}}>IPs:</span>
                {parsed.allIPs.map((ip,i)=>(
                  <div key={i} style={{display:'flex',gap:3,alignItems:'center'}}>
                    <span className="badge badge-blue">{ip}</span>
                    <Btn style={{fontSize:10,padding:'1px 5px'}} onClick={()=>setReconIP(ip)}>→ RECON</Btn>
                  </div>
                ))}
              </div>
            )}
            {parsed.receivedBlocks.map((b,i)=>(
              <div key={i} style={{marginBottom:6,border:'1px solid #C0C0C0',padding:6,background:i%2?'#f8f8f8':'#fff',fontFamily:'Courier New',fontSize:11}}>
                <div style={{fontWeight:'bold',color:'#000080',marginBottom:3}}>Hop {i+1}</div>
                {b.fromHost && <div><span style={{color:'#808080'}}>From: </span>{b.fromHost}</div>}
                {b.byHost   && <div><span style={{color:'#808080'}}>By:   </span>{b.byHost}</div>}
                {b.date     && <div><span style={{color:'#808080'}}>Date: </span>{b.date}</div>}
                {b.ips.length>0 && <div><span style={{color:'#808080'}}>IPs:  </span>{b.ips.join(', ')}</div>}
              </div>
            ))}
          </WinPanel>
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════
   TOOL: ASN EXPLORER
══════════════════════════════════════════════════ */
const ASNExplorer = () => {
  const [query, setQuery] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const lookup = async () => {
    const q = query.trim().toUpperCase().replace(/^AS/i,'');
    if (!q) return;
    setLoading(true); setResult(null); setError('');
    try {
      const res = await fetch(`https://rdap.arin.net/registry/autnum/${q}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      const org = data.entities?.find(e=>e.roles?.includes('registrant'));
      const getVcard = (e, f) => e?.vcardArray?.[1]?.find(v=>v[0]===f)?.[3];
      const abuseEnt = data.entities?.flatMap(e=>e.entities||[]).find(e=>e.roles?.includes('abuse'));

      setResult({
        asn: data.handle || `AS${q}`,
        name: data.name || 'N/A',
        org: getVcard(org,'fn') || org?.handle || 'N/A',
        country: data.country || 'N/A',
        abuseEmail: getVcard(abuseEnt,'email') || 'N/A',
        startAutnum: data.startAutnum || 'N/A',
        endAutnum: data.endAutnum || 'N/A',
        status: (data.status||[]).join(', ') || 'N/A',
        raw: data,
      });
    } catch(e) {
      setError(`Lookup failed: ${e.message}. Try: https://bgpview.io/asn/${q.replace('AS','')}`);
    }
    setLoading(false);
  };

  return (
    <div>
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <input className="win-input" style={{maxWidth:200}} value={query}
          onChange={e=>setQuery(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&lookup()}
          placeholder="e.g. AS15169 or 15169"
        />
        <Btn cls="btn-blue" onClick={lookup} disabled={loading}>
          {loading ? '⏳ LOOKING UP...' : '▶ ASN LOOKUP'}
        </Btn>
        {result && <CopyBtn text={Object.entries(result).filter(([k])=>k!=='raw').map(([k,v])=>`${k}: ${v}`).join('\n')}/>}
      </div>

      {error && <div style={{color:'#880000',fontWeight:'bold',fontFamily:'Courier New',fontSize:12,marginBottom:8}}>{error}</div>}

      {result && (
        <div className="grid-2" style={{gap:8}}>
          <div style={{border:'2px solid #808080',background:'#fff'}}>
            <div style={{background:'#000080',color:'#fff',padding:'3px 8px',fontWeight:'bold',fontSize:12,fontFamily:'Courier New'}}>
              ASN DETAILS — {result.asn}
            </div>
            {[
              ['ASN', result.asn],
              ['Name', result.name],
              ['Organization', result.org],
              ['Country', result.country],
              ['Status', result.status],
              ['Autnum Range', `${result.startAutnum} – ${result.endAutnum}`],
              ['Abuse Email', result.abuseEmail],
            ].map(([label,val],i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns:'160px 1fr',borderBottom:'1px solid #C0C0C0',background:i%2?'#f8f8f8':'#fff'}}>
                <div style={{padding:'4px 8px',fontWeight:'bold',fontSize:11,borderRight:'1px solid #C0C0C0',color:'#000080',textTransform:'uppercase'}}>{label}</div>
                <div style={{padding:'4px 8px',fontFamily:'Courier New',fontSize:11,wordBreak:'break-all'}}>{val}</div>
              </div>
            ))}
          </div>
          <WinPanel title="LINKS & CLI">
            <Terminal lines={[
              `# BGP / routing info:`,
              `# https://bgpview.io/asn/${result.asn.replace('AS','')}`,
              `# https://bgp.he.net/${result.asn}`,
              `# https://stat.ripe.net/widget/asn-neighbours#w.resource=${result.asn}`,
              ``,
              `# Prefixes announced by this ASN:`,
              `# https://bgpview.io/asn/${result.asn.replace('AS','')}/prefixes`,
              ``,
              `# WHOIS:`,
              `whois -h whois.arin.net ${result.asn}`,
            ]}/>
          </WinPanel>
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════
   TOOL: REPEAT OFFENDER TRACKER
══════════════════════════════════════════════════ */
const OffenderTracker = () => {
  const [offenders, setOffenders] = useState(()=>{
    try { return JSON.parse(localStorage.getItem('abuse_offenders')||'[]'); } catch { return []; }
  });
  const [query, setQuery] = useState('');
  const [newIp, setNewIp] = useState('');
  const [newNote, setNewNote] = useState('');
  const [newType, setNewType] = useState('phishing');
  const [checkResult, setCheckResult] = useState(null);

  const save = (data) => {
    setOffenders(data);
    localStorage.setItem('abuse_offenders', JSON.stringify(data));
  };

  const addOffender = () => {
    const ip = newIp.trim();
    if (!ip) return;
    const existing = offenders.find(o=>o.ip===ip);
    const entry = {
      ip,
      type: newType,
      note: newNote.trim(),
      ts: ts(),
    };
    if (existing) {
      const updated = offenders.map(o=>o.ip===ip
        ? {...o, count:(o.count||1)+1, lastSeen:ts(), history:[...(o.history||[]),entry]}
        : o
      );
      save(updated);
    } else {
      save([{ip, count:1, type:newType, note:newNote.trim(), firstSeen:ts(), lastSeen:ts(), history:[entry]}, ...offenders]);
    }
    setNewIp(''); setNewNote('');
  };

  const checkIP = () => {
    const q = query.trim();
    const found = offenders.find(o=>o.ip===q);
    setCheckResult({ q, found });
  };

  const remove = (ip) => save(offenders.filter(o=>o.ip!==ip));

  const TYPES = ['phishing','malware','spam','ddos','brute-force','other'];

  return (
    <div>
      <div className="grid-2" style={{gap:8,marginBottom:8}}>
        <WinPanel title="CHECK IP / DOMAIN">
          <div style={{display:'flex',gap:6,marginBottom:8}}>
            <input className="win-input" value={query} onChange={e=>setQuery(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&checkIP()}
              placeholder="Enter IP or domain to check..."
              style={{flex:1}}
            />
            <Btn cls="btn-blue" onClick={checkIP}>▶ CHECK</Btn>
          </div>
          {checkResult && (
            <div style={{padding:'6px 8px',background:checkResult.found?'#880000':'#006600',color:'#fff',fontFamily:'Courier New',fontSize:12,fontWeight:'bold',border:'2px solid',borderColor:checkResult.found?'#ff4444':'#00ff00'}}>
              {checkResult.found
                ? `⚠ REPEAT OFFENDER — ${checkResult.q} — ${checkResult.found.count} offense(s) — Last: ${checkResult.found.lastSeen} — Type: ${checkResult.found.type}`
                : `✓ CLEAN — ${checkResult.q} — No prior offenses on record`
              }
            </div>
          )}
        </WinPanel>

        <WinPanel title="LOG NEW OFFENSE">
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            <input className="win-input" value={newIp} onChange={e=>setNewIp(e.target.value)}
              placeholder="IP or domain..." onKeyDown={e=>e.key==='Enter'&&addOffender()}
            />
            <select className="win-select" style={{width:'100%'}} value={newType} onChange={e=>setNewType(e.target.value)}>
              {TYPES.map(t=><option key={t} value={t}>{t.toUpperCase()}</option>)}
            </select>
            <input className="win-input" value={newNote} onChange={e=>setNewNote(e.target.value)}
              placeholder="Optional note / ticket ref..."
            />
            <Btn cls="btn-green" onClick={addOffender}>+ LOG OFFENSE</Btn>
          </div>
        </WinPanel>
      </div>

      <WinPanel title={`OFFENDER DATABASE — ${offenders.length} record(s)`}>
        {offenders.length===0
          ? <div style={{padding:16,textAlign:'center',color:'#808080',fontFamily:'Courier New',fontSize:12}}>[ NO RECORDS ]</div>
          : (
            <div style={{border:'2px solid #808080',background:'#fff',maxHeight:400,overflowY:'auto'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 100px 80px 1fr auto',background:'#000080',color:'#fff',padding:'3px 8px',fontWeight:'bold',fontSize:11,fontFamily:'Courier New',gap:8}}>
                <span>IP / DOMAIN</span><span>TYPE</span><span>COUNT</span><span>LAST SEEN</span><span>DEL</span>
              </div>
              {offenders.map((o,i)=>(
                <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 100px 80px 1fr auto',padding:'4px 8px',borderBottom:'1px solid #C0C0C0',background:o.count>=3?'#fff0f0':i%2?'#f8f8f8':'#fff',gap:8,alignItems:'center'}}>
                  <span style={{fontFamily:'Courier New',fontSize:11,wordBreak:'break-all',color:o.count>=3?'#880000':'#000080',fontWeight:o.count>=3?'bold':'normal'}}>
                    {o.count>=3 && '⚠ '}{o.ip}
                  </span>
                  <span className={`badge ${o.type==='phishing'?'badge-red':o.type==='malware'?'badge-purple':o.type==='spam'?'badge-yellow':'badge-gray'}`} style={{fontSize:9}}>{o.type}</span>
                  <span style={{fontFamily:'Courier New',fontSize:12,fontWeight:'bold',color:o.count>=3?'#880000':'#000'}}>{o.count}</span>
                  <span style={{fontFamily:'Courier New',fontSize:11,color:'#808080'}}>{o.lastSeen}</span>
                  <Btn cls="btn-red" style={{fontSize:10,padding:'1px 6px'}} onClick={()=>remove(o.ip)}>✕</Btn>
                </div>
              ))}
            </div>
          )
        }
      </WinPanel>
    </div>
  );
};



/* ══════════════════════════════════════════════════
   TOOL: EVIDENCE LOG
══════════════════════════════════════════════════ */
const EvidenceLog = ({ entries, removeEntry, exportAll, addEntry }) => {
  const [note, setNote] = useState('');
  const [filter, setFilter] = useState('ALL');
  const cats = ['ALL','URL','HEADER','RESPONSE','NOTE','URL-CHECK'];
  const visible = filter==='ALL' ? entries : entries.filter(e=>e.category===filter);

  return (
    <div>
      <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{fontWeight:'bold',fontSize:11}}>FILTER:</span>
        {cats.map(c=>(
          <Btn key={c} cls={filter===c?'btn-blue':''} style={{fontSize:11,padding:'2px 8px'}}
            onClick={()=>setFilter(c)}>{c}</Btn>
        ))}
        <Btn cls="btn-green" onClick={exportAll} style={{marginLeft:'auto'}}>📋 EXPORT ALL</Btn>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:8}}>
        <input className="win-input" value={note} onChange={e=>setNote(e.target.value)}
          placeholder="Add a note to evidence log..."
          onKeyDown={e=>{if(e.key==='Enter'&&note.trim()){addEntry(note.trim(),'NOTE');setNote('');}}}
          style={{flex:1}}
        />
        <Btn cls="btn-green" onClick={()=>{if(note.trim()){addEntry(note.trim(),'NOTE');setNote('');}}}>+ ADD NOTE</Btn>
      </div>

      <div style={{border:'2px solid',borderColor:'#808080 #fff #fff #808080',boxShadow:'inset 1px 1px 0 #404040',background:'#fff',maxHeight:480,overflowY:'auto'}}>
        {visible.length===0
          ? <div style={{padding:16,textAlign:'center',color:'#808080',fontFamily:'Courier New',fontSize:12}}>
              [ NO ENTRIES ]
            </div>
          : visible.map(e=>(
            <div key={e.id} className="log-entry">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:2}}>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <span className={`badge ${
                    e.category==='URL'||e.category==='URL-CHECK'?'badge-blue':
                    e.category==='HEADER'?'badge-purple':
                    e.category==='RESPONSE'?'badge-green':'badge-gray'
                  }`} style={{fontSize:9}}>{e.category}</span>
                  <span style={{color:'#808080',fontSize:10}}>{e.ts}</span>
                </div>
                <Btn cls="btn-red" style={{fontSize:10,padding:'1px 6px'}} onClick={()=>removeEntry(e.id)}>✕ DEL</Btn>
              </div>
              <div style={{whiteSpace:'pre-wrap',wordBreak:'break-all',color:'#000',fontSize:11}}>{e.content}</div>
            </div>
          ))
        }
      </div>
      <div style={{marginTop:4,fontSize:11,color:'#808080'}}>
        {visible.length} entr{visible.length===1?'y':'ies'} {filter!=='ALL'?`(filtered: ${filter})`:'total'}
      </div>
    </div>
  );
};
