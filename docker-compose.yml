services:
  backend:
    build:
      context: ./backend
    container_name: abuse-console-backend
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
    container_name: abuse-console-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge
